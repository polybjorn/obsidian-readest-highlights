name: Release

on:
    push:
        tags:
            - "*"

permissions:
    contents: write
    id-token: write
    attestations: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0
            - uses: actions/setup-node@v6
              with:
                  node-version: 22.x
                  cache: "npm"
            - run: npm ci
            - run: npm run build
            - name: Attest build provenance
              uses: actions/attest-build-provenance@v4
              with:
                  subject-path: "main.js,styles.css,manifest.json"
            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAG: ${{ github.ref_name }}
                  REPO: ${{ github.repository }}
              run: |
                  notes=$(awk -v ver="$TAG" '
                    $0 ~ "^## \\[" ver "\\]" { found=1; next }
                    found && /^## \[/ { exit }
                    found && /^\[.*\]:/ { exit }
                    found { print }
                  ' CHANGELOG.md | awk 'NF{found=1} found' | tac | awk 'NF{found=1} found' | tac)

                  if [ -n "$notes" ]; then
                      prev=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)
                      if [ -n "$prev" ]; then
                          notes="${notes}"$'\n\n'"**Full Changelog**: https://github.com/${REPO}/compare/${prev}...${TAG}"
                      fi
                      gh release create "$TAG" \
                          --title "$TAG" \
                          --notes "$notes" \
                          main.js manifest.json styles.css
                  else
                      gh release create "$TAG" \
                          --title "$TAG" \
                          --generate-notes \
                          main.js manifest.json styles.css
                  fi
